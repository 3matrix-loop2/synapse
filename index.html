<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse — Your space. Your flow.</title>
    <meta name="description" content="Synapse is a visual workspace for projects, notes, tasks and ideas, connected as a living knowledge graph." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D9722E" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var saved = JSON.parse(localStorage.getItem('synapse:theme'));
          var theme = saved?.theme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          var accent = saved?.accent || 'orange';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.setAttribute('data-accent', accent);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.setAttribute('data-accent', 'orange');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
